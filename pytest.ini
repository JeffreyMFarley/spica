[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Put the repo root on sys.path so `from src...` and `from tests...` resolve
# regardless of how pytest is invoked.
pythonpath = .

# Keep output readable; show reasons for skips (the wand suite skips when the
# proxy isn't running).
addopts = -ra -x

# moto/botocore emit deprecation noise on Python 3.12 that isn't ours to fix.
filterwarnings =
    ignore::DeprecationWarning:botocore.*
    ignore::PendingDeprecationWarning:moto.*
